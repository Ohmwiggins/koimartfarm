runConfig:
  minInstances: 0

env:
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY

  - variable: NODEMAILER_GOOGLE_CLIENT_ID
    secret: NODEMAILER_GOOGLE_CLIENT_ID

  - variable: NODEMAILER_GOOGLE_CLIENT_SECRET
    secret: NODEMAILER_GOOGLE_CLIENT_SECRET

  - variable: NODEMAILER_GOOGLE_REFRESH_TOKEN
    secret: NODEMAILER_GOOGLE_REFRESH_TOKEN

  - variable: NODEMAILER_APP_PASSWORD
    secret: NODEMAILER_APP_PASSWORD

  - variable: NODEMAILER_GMAIL_USER
    secret: NODEMAILER_GMAIL_USER

  - variable: TARGET_EMAIL
    secret: TARGET_EMAIL
