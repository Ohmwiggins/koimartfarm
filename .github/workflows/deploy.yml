name: Production Deploy

# Runs when a PR is merged into main — deploys to the production Firebase App Hosting backend.

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1. Checkout main branch
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Lint check
      - name: Lint
        run: npm run lint

      # 5. Build
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # 6. Authenticate to Google Cloud
      #    → Same FIREBASE_SERVICE_ACCOUNT secret used for preview
      - name: Authenticate to Google
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # 7. Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 8. Deploy to PRODUCTION backend (koimartfarm-ui)
      - name: Deploy to production
        run: |
          firebase apphosting:rollouts:create koimartfarm-ui \
            --git-branch main \
            --project koimartfarm-c84af \
            --force
