name: Preview Deploy (PR)

# Runs on every Pull Request — builds the app and deploys a preview to Firebase App Hosting.
# The preview URL will be commented on the PR automatically.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # needed to post PR comments

    steps:
      # 1. Checkout the PR branch
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js with npm cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Run lint (fail fast if there are errors)
      - name: Lint
        run: npm run lint

      # 5. Build the Next.js app
      - name: Build
        run: npm run build
        env:
          # Add any build-time env vars here if needed
          NODE_ENV: production

      # 6. Authenticate to Google Cloud using the service account JSON
      #    → Go to Firebase Console > Project Settings > Service Accounts > Generate new private key
      #    → Add the JSON content as a GitHub Secret named: FIREBASE_SERVICE_ACCOUNT
      - name: Authenticate to Google
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # 7. Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 8. Create a rollout on the PREVIEW backend in Firebase App Hosting
      #    → You need to create a second backend named "koimartfarm-ui-preview" in the Firebase Console
      #    → Firebase Console > App Hosting > Add backend > name it "koimartfarm-ui-preview"
      #    → Connect it to this same GitHub repo (any branch is fine — we override via CLI)
      - name: Deploy preview to Firebase App Hosting
        id: deploy
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Deploying branch: $BRANCH"
          firebase apphosting:rollouts:create koimartfarm-ui-preview \
            --git-branch "$BRANCH" \
            --project koimartfarm-c84af \
            --force

      # 9. Post a comment on the PR with the preview URL
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const sha    = context.payload.pull_request.head.sha.slice(0, 7);
            const body   = [
              '## 🚀 Preview Deployment Ready',
              '',
              `**Branch:** \`${branch}\`  `,
              `**Commit:** \`${sha}\``,
              '',
              '**Preview URL:** Check the [Firebase Console](https://console.firebase.google.com/project/koimartfarm-c84af/apphosting) for the live preview link under the `koimartfarm-ui-preview` backend.',
              '',
              '_This preview will be available for 7 days._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
